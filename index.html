<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iPhone Mockup Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
          "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"
        }
      }
    </script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">iPhone Mockup Generator</div>
      <div class="hint-inline">Drag to orbit · scroll to zoom · pick a gizmo mode to move/rotate the phone</div>
      <div class="topbar-auth">
        <div id="headerSignedOut">
          <button id="openLogin" class="btn mini">Log in</button>
          <button id="openSignup" class="btn mini primary">Sign up</button>
        </div>
        <div id="headerSignedIn" hidden>
          <span class="user-pill">Signed in as <strong id="userEmail"></strong></span>
          <button id="signOut" class="btn mini">Sign out</button>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="stage-wrap">
        <canvas id="stage"></canvas>
        <div class="loading" id="loading">Loading model…</div>
      </section>

      <aside class="panel">
        <!-- Sticky header: full-width Save, then a scrollable device row -->
        <div class="panel-head">
          <button id="savePng" class="btn primary">⤓ Save as PNG</button>
        </div>
        <div class="devicebar" id="deviceBar">
          <button id="addDevice" class="btn add-device">＋ Add Device</button>
        </div>

        <div class="panel-scroll">
          <div class="group">
            <div class="group-title">Presets</div>
            <select id="presetSelect" class="preset-select"></select>
            <div class="modes">
              <button id="savePreset" class="btn">＋ Save preset</button>
              <button id="deletePreset" class="btn">🗑 Delete</button>
            </div>
            <div class="authnote" id="presetNote">
              Saves every device's transform + the camera view (not the screen image).
            </div>
          </div>

          <div class="divider"></div>

          <div class="group">
            <div class="group-title">Screen</div>
            <label class="btn upload" for="screenInput">⤒ Upload screen image</label>
            <input id="screenInput" type="file" accept="image/*" hidden />
            <div class="assetrow" id="assetRow"></div>
            <button id="clearScreen" class="btn">Reset screen</button>
          </div>

          <div class="divider"></div>

          <div class="group">
            <div class="group-title">Transform</div>
            <div class="modes">
              <button class="btn mode active" data-mode="translate" id="modeTranslate">Move (W)</button>
              <button class="btn mode" data-mode="rotate" id="modeRotate">Rotate (E)</button>
            </div>
            <label class="check">
              <input id="gizmoToggle" type="checkbox" checked />
              <span>Show gizmo</span>
            </label>
            <label class="row">
              <span>X</span>
              <input id="tX" type="range" />
              <input id="tXn" type="number" class="num" />
            </label>
            <label class="row">
              <span>Y</span>
              <input id="tY" type="range" />
              <input id="tYn" type="number" class="num" />
            </label>
            <label class="row">
              <span>Z</span>
              <input id="tZ" type="range" />
              <input id="tZn" type="number" class="num" />
            </label>
            <button id="resetXform" class="btn">↻ Reset move</button>
          </div>

          <div class="divider"></div>

          <div class="group">
            <div class="group-title">Phone color</div>
            <div class="swatches" id="swatches"></div>
            <label class="row">
              <span>Custom</span>
              <input id="bodyColor" type="color" value="#4a4a50" />
            </label>
          </div>

          <div class="divider"></div>

          <div class="group" id="cloudGroup">
            <div class="group-title">My mockups</div>
            <button id="saveCloud" class="btn">☁ Save mockup to cloud</button>
            <div class="mockup-list" id="mockupList"></div>
          </div>

          <div class="status" id="status">Loading…</div>
        </div>
      </aside>
    </main>

    <!-- Account modal -->
    <div class="modal" id="authModal" hidden>
      <div class="modal-box auth-box">
        <div class="modal-title">Account</div>
        <input id="authEmail" class="field" type="email" placeholder="email" autocomplete="username" />
        <input id="authPassword" class="field" type="password" placeholder="password" autocomplete="current-password" />
        <div class="modes">
          <button id="signIn" class="btn">Log in</button>
          <button id="signUp" class="btn primary">Sign up</button>
        </div>
        <div class="authnote" id="authNote"></div>
        <div class="modal-actions">
          <div class="spacer"></div>
          <button id="authClose" class="btn">Close</button>
        </div>
      </div>
    </div>

    <!-- Save / crop modal -->
    <div class="modal" id="saveModal" hidden>
      <div class="modal-box">
        <div class="modal-title">Crop &amp; save</div>
        <div class="crop-stage" id="cropStage">
          <img id="cropImg" alt="preview" draggable="false" />
          <div class="crop-box" id="cropBox">
            <span class="handle tl" data-h="tl"></span>
            <span class="handle tr" data-h="tr"></span>
            <span class="handle bl" data-h="bl"></span>
            <span class="handle br" data-h="br"></span>
          </div>
        </div>
        <div class="modal-actions">
          <button id="cropReset" class="btn">Reset crop</button>
          <div class="spacer"></div>
          <button id="cropCancel" class="btn">Cancel</button>
          <button id="cropDownload" class="btn primary">⤓ Download PNG</button>
        </div>
      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
